<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>Panel de Monitoreo GPS</title>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.css"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1e1e1e;
            color: white;
        }

        h1 {
            background: #111;
            padding: 12px;
            margin: 0;
            text-align: center;
        }

        #map {
            width: 100%;
            height: 60vh;
            border-bottom: 3px solid #333;
        }

        button {
            background: #2ecc71;
            border: none;
            padding: 10px 16px;
            margin: 6px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #27ae60;
        }

        .panel {
            background: #2b2b2b;
            margin: 10px;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .dispositivo {
            background: #3a3a3a;
            border-left: 5px solid #2ecc71;
            border-radius: 6px;
            padding: 10px;
            margin: 10px 0;
        }

        .alerta {
            color: #ff4d4d;
            font-weight: bold;
            margin: 6px 0;
        }

        .botonMapa {
            margin-top: 6px;
            padding: 6px 10px;
            background: #3498db;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .botonMapa:hover {
            background: #2980b9;
        }
    </style>

</head>

<body>

    <h1>Panel de Monitoreo GPS</h1>

    <div style="text-align:center">
        <button onclick="iniciarDibujo()">Crear Geocerca</button>
        <button onclick="finalizarGeocerca()">Guardar Geocerca</button>
        <button onclick="eliminarGeocerca()">Eliminar Geocerca</button>
    </div>

    <div id="map"></div>

    <div class="panel">
        <h3 id="contador">Dispositivos conectados: 0</h3>
        <div id="dispositivos"></div>
    </div>

    <div class="panel">
        <h3>Alertas en vivo</h3>
        <div id="alertas"></div>
    </div>

    <div class="panel">
        <h3>Historial</h3>
        <div id="historial"></div>
    </div>

    <audio id="alarma">
        <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
    </audio>

    <script>

        const estadoAnterior = {}
        const rutas = {}
        const ultimaUbicacion = {} // 🔥 NUEVO (ANTI-RUIDO)

        const part1 = "pk."
        const part2 = "eyJ1IjoibW9pc2VzNzgiLCJhIjoiY21tNWIwMWg4MDI5MDJvcHM1OGpxbHVwcyJ9.dTboVHBSjC8nakpKg6M0ag"

        mapboxgl.accessToken = part1 + part2

        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/satellite-streets-v12",
            center: [-68.15, -16.5],
            zoom: 14
        })

        const draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: { polygon: true, trash: true },
            styles: [
                {
                    "id": "polygon-fill",
                    "type": "fill",
                    "filter": ["all", ["==", "$type", "Polygon"]],
                    "paint": { "fill-color": "#00ff00", "fill-opacity": 0.3 }
                },
                {
                    "id": "polygon-line",
                    "type": "line",
                    "filter": ["all", ["==", "$type", "Polygon"]],
                    "paint": { "line-color": "#00ff00", "line-width": 3 }
                }
            ]
        })

        map.addControl(draw)

        let geocerca = null

        function iniciarDibujo() { draw.changeMode("draw_polygon") }

        function finalizarGeocerca() {
            const data = draw.getAll()
            if (data.features.length === 0) { alert("No dibujaste ninguna geocerca"); return }
            geocerca = data.features[0].geometry
            db.collection("geocerca").doc("poligono").set({
                coordenadas: JSON.stringify(geocerca.coordinates)
            }).then(() => { alert("Geocerca guardada en Firebase") })
        }

        function eliminarGeocerca() {
            if (!confirm("¿Seguro que quieres eliminar la geocerca?")) return
            draw.deleteAll()
            geocerca = null
            db.collection("geocerca").doc("poligono").delete()
        }

        function centrarMapa(lat, lon) {
            map.flyTo({ center: [lon, lat], zoom: 20 })
        }

        /* FIREBASE */

        const firebaseConfig = {
            apiKey: "AIzaSy" + "Bx3yaSKnebWEZu2pp9jAnmj-43fk3FIig",
            authDomain: "mapbox-moises.firebaseapp.com",
            projectId: "mapbox-moises"
        }

        firebase.initializeApp(firebaseConfig)
        const db = firebase.firestore()
        const marcadores = {}

        db.collection("geocerca").doc("poligono")
            .onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data()
                    geocerca = {
                        type: "Polygon",
                        coordinates: JSON.parse(data.coordenadas)
                    }
                    draw.deleteAll()
                    draw.add({ type: "Feature", geometry: geocerca })
                }
            })

        /* UBICACIONES */

        db.collection("ubicaciones")
            .onSnapshot(snapshot => {

                let contador = 0
                let html = ""

                snapshot.forEach(doc => {

                    contador++

                    const id = doc.id
                    const data = doc.data()

                    let lat = data.latitud
                    let lon = data.longitud

                    // 🔥 FILTRO ANTI-RUIDO (BIEN HECHO)
                    let ignorar = false

                    if (ultimaUbicacion[id]) {

                        const prev = ultimaUbicacion[id]

                        const distancia = turf.distance(
                            turf.point([prev.lon, prev.lat]),
                            turf.point([lon, lat]),
                            { units: 'meters' }
                        )

                        if (distancia > 50) ignorar = true
                        if (distancia < 5) ignorar = true
                    }

                    if (!ignorar) {
                        ultimaUbicacion[id] = { lat, lon }
                    } else {
                        if (ultimaUbicacion[id]) {
                            lat = ultimaUbicacion[id].lat
                            lon = ultimaUbicacion[id].lon
                        }
                    }

                    let hora = ""
                    if (data.hora && data.hora.toDate) {
                        hora = data.hora.toDate().toLocaleTimeString()
                    }

                    let dentro = true

                    if (geocerca) {
                        const punto = turf.point([lon, lat])
                        const poligono = turf.polygon(geocerca.coordinates)
                        dentro = turf.booleanPointInPolygon(punto, poligono)
                    }

                    const color = dentro ? "green" : "red"

                    if (!marcadores[id]) {
                        marcadores[id] = new mapboxgl.Marker({ color })
                            .setLngLat([lon, lat])
                            .addTo(map)
                    } else {
                        marcadores[id].setLngLat([lon, lat])
                    }

                    if (!rutas[id]) rutas[id] = []
                    rutas[id].push([lon, lat])

                    const rutaId = "ruta-" + id

                    const geojsonRuta = {
                        type: "Feature",
                        geometry: { type: "LineString", coordinates: rutas[id] }
                    }

                    if (map.getSource(rutaId)) {
                        map.getSource(rutaId).setData(geojsonRuta)
                    } else {
                        map.addSource(rutaId, { type: "geojson", data: geojsonRuta })
                        map.addLayer({
                            id: rutaId,
                            type: "line",
                            source: rutaId,
                            paint: { "line-color": "yellow", "line-width": 4 }
                        })
                    }

                    const estado = dentro ? "Dentro" : "Fuera"

                    html += `
<div class="dispositivo">
<b>📱 Dispositivo:</b> ${id}<br>
<b>Estado:</b> ${estado}<br>
<b>Latitud:</b> ${lat}<br>
<b>Longitud:</b> ${lon}<br>
<b>Hora:</b> ${hora}<br>
<button class="botonMapa" onclick="centrarMapa(${lat},${lon})">Ver en mapa</button>
</div>`

                    if (estadoAnterior[id] === undefined) estadoAnterior[id] = dentro

                    if (estadoAnterior[id] === true && dentro === false) {
                        db.collection("alertas").add({
                            dispositivo: id, tipo: "SALIO", hora: new Date()
                        })
                        document.getElementById("alertas").innerHTML +=
                            "<div class='alerta'>⚠ " + id + " salió de la geocerca</div>"
                        document.getElementById("alarma").play()
                    }

                    if (estadoAnterior[id] === false && dentro === true) {
                        db.collection("alertas").add({
                            dispositivo: id, tipo: "ENTRO", hora: new Date()
                        })
                        document.getElementById("alertas").innerHTML +=
                            "<div style='color:#2ecc71'>✔ " + id + " volvió a entrar</div>"
                    }

                    estadoAnterior[id] = dentro

                })

                document.getElementById("contador").innerHTML =
                    "Dispositivos conectados: " + contador

                document.getElementById("dispositivos").innerHTML = html

            })

        /* HISTORIAL */

        db.collection("alertas")
            .orderBy("hora", "desc")
            .limit(20)
            .onSnapshot(snapshot => {
                let html = ""
                snapshot.forEach(doc => {
                    const data = doc.data()
                    const hora = data.hora.toDate().toLocaleTimeString()
                    html += `<div>${data.dispositivo} - ${data.tipo} - ${hora}</div>`
                })
                document.getElementById("historial").innerHTML = html
            })

    </script>

</body>

</html>
