<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>Proyecto Mapbox</title>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.css"
        rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        #map {
            width: 100%;
            height: 60vh;
        }

        .panel {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
        }

        .dispositivo {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            margin: 8px;
        }

        .alerta {
            color: red;
            font-weight: bold;
            margin: 4px;
        }

        .botonMapa {
            margin-top: 6px;
            padding: 4px 8px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <h1>Proyecto Mapbox</h1>

    <button onclick="iniciarDibujo()">Crear Geocerca</button>
    <button onclick="finalizarGeocerca()">Finalizar Geocerca</button>

    <div id="map"></div>

    <div class="panel">
        <h3 id="contador">Dispositivos conectados: 0</h3>
        <div id="dispositivos"></div>
    </div>

    <div class="panel">
        <h3>Alertas</h3>
        <div id="alertas"></div>
    </div>

    <audio id="alarma">
        <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
    </audio>

    <script>

        const estadoAnterior = {};

        const part1 = "pk.";
        const part2 = "eyJ1IjoibW9pc2VzNzgiLCJhIjoiY21tNWIwMWg4MDI5MDJvcHM1OGpxbHVwcyJ9.dTboVHBSjC8nakpKg6M0ag";

        mapboxgl.accessToken = part1 + part2;

        const map = new mapboxgl.Map({
            container: "map",
            style: "mapbox://styles/mapbox/satellite-streets-v12",
            center: [-68.15, -16.5],
            zoom: 14
        });

        const draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: { polygon: true, trash: true },
            styles: [
                {
                    id: 'fill',
                    type: 'fill',
                    filter: ['all', ['==', '$type', 'Polygon']],
                    paint: { 'fill-color': '#00ff00', 'fill-opacity': 0.3 }
                },
                {
                    id: 'line',
                    type: 'line',
                    filter: ['all', ['==', '$type', 'Polygon']],
                    paint: { 'line-color': '#008000', 'line-width': 3 }
                }
            ]
        });

        map.addControl(draw);

        let geocerca = null;

        function iniciarDibujo() {
            draw.changeMode("draw_polygon");
        }

        function finalizarGeocerca() {

            const data = draw.getAll();

            if (data.features.length > 0) {
                geocerca = data.features[0];
                alert("Geocerca guardada");
            }

        }

        function centrarMapa(lat, lon) {
            map.flyTo({
                center: [lon, lat],
                zoom: 18
            });
        }

        const firebaseConfig = {
            apiKey: "AIzaSy" + "Bx3yaSKnebWEZu2pp9jAnmj-43fk3FIig",
            authDomain: "mapbox-moises.firebaseapp.com",
            projectId: "mapbox-moises"
        };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();

        const marcadores = {};

        db.collection("ubicaciones").onSnapshot(snapshot => {

            let contador = 0;
            let html = "";

            snapshot.forEach(doc => {

                contador++;

                const id = doc.id;
                const data = doc.data();

                const lat = data.latitud;
                const lon = data.longitud;

                let hora = "";

                if (data.hora && data.hora.toDate) {
                    hora = data.hora.toDate().toLocaleTimeString();
                }

                let dentro = true;

                if (geocerca) {

                    const punto = turf.point([lon, lat]);

                    dentro = turf.booleanPointInPolygon(punto, geocerca);

                }

                const color = dentro ? "green" : "red";

                if (!marcadores[id]) {

                    const marcador = new mapboxgl.Marker({ color: color })
                        .setLngLat([lon, lat])
                        .setPopup(new mapboxgl.Popup().setHTML("<b>" + id + "</b>"))
                        .addTo(map);

                    marcadores[id] = marcador;

                } else {

                    marcadores[id].setLngLat([lon, lat]);

                }

                const estado = dentro ? "Dentro" : "Fuera";

                html += `

<div class="dispositivo">

<b>📱 Dispositivo:</b> ${id}<br>
<b>Estado:</b> ${estado}<br>
<b>Latitud:</b> ${lat}<br>
<b>Longitud:</b> ${lon}<br>
<b>Hora:</b> ${hora}<br>

<button class="botonMapa" onclick="centrarMapa(${lat},${lon})">
Ver en mapa
</button>

</div>

`;

                if (estadoAnterior[id] === undefined) {
                    estadoAnterior[id] = dentro;
                }

                if (estadoAnterior[id] === true && dentro === false) {

                    const horaActual = new Date().toLocaleTimeString();

                    document.getElementById("alertas").innerHTML +=
                        "<div class='alerta'>⚠ " + id + " salió de la geocerca - " + horaActual + "</div>";

                    document.getElementById("alarma").play();

                }

                estadoAnterior[id] = dentro;

            });

            document.getElementById("contador").innerHTML =
                "Dispositivos conectados: " + contador;

            document.getElementById("dispositivos").innerHTML = html;

        });

    </script>

</body>

</html>
